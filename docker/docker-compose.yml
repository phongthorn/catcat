services:
  nginx:
    image: nginx:1.27-alpine
    container_name: catcat-nginx
    restart: unless-stopped
    networks:
      - default
      - mmc-edge
    volumes:
      # Templates are rendered by the image's envsubst entrypoint so the
      # shared secret is injected at runtime, never committed to the conf.
      - ./nginx/templates:/etc/nginx/templates:ro
      # Shadow the image's stock default.conf so it can't compete with our
      # server blocks. Done via mount (not a CMD override) so the default
      # entrypoint still runs envsubst on the templates.
      - ./nginx/empty.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ../front:/var/www/front:ro
      - ../back:/var/www/back:ro
    environment:
      # Substituted into catcat.conf.template's X-Catcat-Auth header.
      CATCAT_WS_SECRET: ${CATCAT_WS_SECRET}
    # Lets the container reach catcat.exe running on the Windows host
    # at host.docker.internal:8080. host-gateway keeps this working on Linux too.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - php

  php:
    build: ./php
    container_name: catcat-php
    restart: unless-stopped
    volumes:
      - ../front:/var/www/front
      - ../back:/var/www/back
    environment:
      # session.php sends this in X-Catcat-Auth when provisioning a Rust session.
      CATCAT_WS_SECRET: ${CATCAT_WS_SECRET}
    # php-fpm reaches the host adb server (5037) and the Rust server (8080).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      mysql:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    container_name: catcat-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: catcat-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ${CLOUDFLARED_CREDS_FILE}:/etc/cloudflared/2f22f096-0106-41ac-b02f-88ce0eaa94b8.json:ro
    networks:
      - default
      - mmc-edge
    depends_on:
      - nginx

  coturn:
    image: coturn/coturn:latest
    container_name: catcat-coturn
    restart: unless-stopped
    # network_mode: host doesn't reach the real Windows NIC — Docker Desktop
    # runs containers inside its own Linux VM, so "host" means the VM, not
    # 10.10.2.181. Explicit port mapping lets Docker Desktop's NAT forward
    # correctly instead.
    ports:
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "49160-49200:49160-49200/udp"
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    # coturn won't map external-ip to a relay candidate unless listening-ip /
    # relay-ip are also set explicitly — and the container's own IP changes
    # every recreate (Docker-assigned), so resolve it at startup instead of
    # hardcoding it in the conf file.
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        OWN_IP=$$(hostname -i)
        exec turnserver -c /etc/coturn/turnserver.conf --listening-ip=$$OWN_IP --relay-ip=$$OWN_IP

volumes:
  mysql-data:

networks:
  mmc-edge:
    external: true
