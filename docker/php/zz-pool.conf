; Raise the worker count above the stock 5. The portal's hot path (thumb.php)
; blocks on adb screencap (~1-2s of I/O wait, not CPU), so with only 5 workers a
; couple of open grids saturate the pool and concurrent focus.php / session.php
; requests 504. These are I/O-bound, so a higher child count is cheap.
[www]
pm = dynamic
pm.max_children = 60
pm.start_servers = 10
pm.min_spare_servers = 6
pm.max_spare_servers = 20
