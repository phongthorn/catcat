# Minimal TURN/STUN config for littlecat Milestone 3 (NAT traversal test).
# Static long-term credential — fine for this PoC; rotate before any real deploy.

listening-port=3478
min-port=49160
max-port=49200

# Router forwards both 3478/udp and 49160-49200/udp to this host's LAN IP,
# which Docker Desktop's NAT then forwards into this container. Only the
# public IP makes sense here — the private side from coturn's perspective is
# whatever IP Docker assigns the container, not the Windows host's LAN IP.
external-ip=171.103.43.209

realm=littlecat.local
fingerprint
lt-cred-mech
user=littlecat:24bcda237526615de4cf21d1be476c81

no-cli
no-tls
no-dtls
log-file=stdout
verbose
