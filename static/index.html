<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panda — Mobile Stream</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #111; color: #eee; font-family: monospace; }
  #app { display: flex; flex-direction: column; align-items: center; padding: 16px; gap: 12px; }
  h1 { font-size: 1.2rem; color: #4af; }
  #controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }
  select, button { padding: 8px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 14px; }
  select { background: #222; color: #eee; border: 1px solid #444; }
  button { background: #4af; color: #000; font-weight: bold; }
  button:disabled { background: #555; color: #888; cursor: default; }
  #status { font-size: 12px; color: #aaa; }
  #screen-wrap {
    position: relative;
    width: 360px;
    background: #000;
    border: 2px solid #333;
    border-radius: 12px;
    overflow: hidden;
    touch-action: none;
  }
  video { width: 100%; display: block; }
  canvas#screen { width: 100%; display: block; }
  #latency { position: absolute; top: 6px; right: 8px; font-size: 11px; color: #4af; background: rgba(0,0,0,.6); padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<div id="app">
  <h1>🐼 Panda Mobile Stream</h1>
  <div id="controls">
    <select id="device-select"><option>Loading devices...</option></select>
    <button id="btn-start">Start Stream</button>
    <button id="btn-stop" disabled>Stop</button>
  </div>
  <div id="status">Idle</div>
  <div id="screen-wrap">
    <canvas id="screen" width="720" height="1600"></canvas>
    <div id="latency">--ms</div>
  </div>
</div>

<script>
const API = '';
let ws = null;
let sessionId = null;
let frameCount = 0;
let lastFrameTime = performance.now();

const deviceSelect = document.getElementById('device-select');
const btnStart = document.getElementById('btn-start');
const btnStop = document.getElementById('btn-stop');
const statusEl = document.getElementById('status');
const canvas = document.getElementById('screen');
const ctx = canvas.getContext('2d');
const latencyEl = document.getElementById('latency');

// Load devices
async function loadDevices() {
  const res = await fetch(`${API}/api/devices`);
  const data = await res.json();
  deviceSelect.innerHTML = '';
  (data.devices || []).forEach(d => {
    const opt = document.createElement('option');
    opt.value = d;
    opt.textContent = d;
    deviceSelect.appendChild(opt);
  });
  statusEl.textContent = `${data.devices?.length || 0} device(s) found`;
}

btnStart.onclick = async () => {
  const serial = deviceSelect.value;
  if (!serial) return;
  statusEl.textContent = 'Creating session...';
  btnStart.disabled = true;

  const res = await fetch(`${API}/api/session/${serial}`);
  const data = await res.json();
  sessionId = data.session_id;

  statusEl.textContent = 'Connecting WebSocket...';
  ws = new WebSocket(data.ws_url);
  ws.binaryType = 'arraybuffer';

  ws.onopen = () => {
    statusEl.textContent = 'Streaming...';
    btnStop.disabled = false;
  };

  ws.onmessage = (e) => {
    // H.264 NAL units arrive as binary — decode with MSE
    handleVideoData(new Uint8Array(e.data));
    const now = performance.now();
    const fps = Math.round(1000 / (now - lastFrameTime));
    latencyEl.textContent = `${fps} fps`;
    lastFrameTime = now;
  };

  ws.onclose = () => {
    statusEl.textContent = 'Disconnected';
    btnStart.disabled = false;
    btnStop.disabled = true;
  };

  ws.onerror = (e) => {
    statusEl.textContent = 'WebSocket error';
    console.error(e);
  };
};

btnStop.onclick = () => {
  if (ws) ws.close();
  btnStop.disabled = true;
  btnStart.disabled = false;
};

// ---- Video decode via WebCodecs ----
canvas.style.display = 'block';
let decoder = null;
let spsNalu = null;
let ppsNalu = null;
let gotKeyframe = false;

// Extract raw NAL payload (strip Annex-B start code)
function stripStartCode(nalu) {
  if (nalu[0] === 0 && nalu[1] === 0 && nalu[2] === 0 && nalu[3] === 1) return nalu.slice(4);
  if (nalu[0] === 0 && nalu[1] === 0 && nalu[2] === 1) return nalu.slice(3);
  return nalu;
}

// Build AVCC extradata (avcC box) from raw SPS + PPS bytes (no start codes)
function buildAVCDescription(spsRaw, ppsRaw) {
  // 6 header + 2 sps_len + sps + 1 num_pps + 2 pps_len + pps
  const size = 6 + 2 + spsRaw.length + 1 + 2 + ppsRaw.length;
  const buf = new Uint8Array(size);
  let i = 0;
  buf[i++] = 1;                          // configurationVersion
  buf[i++] = spsRaw[1];                 // profile_idc
  buf[i++] = spsRaw[2];                 // profile_compatibility
  buf[i++] = spsRaw[3];                 // level_idc
  buf[i++] = 0xff;                       // lengthSizeMinusOne = 3
  buf[i++] = 0xe1;                       // numSequenceParameterSets = 1
  buf[i++] = (spsRaw.length >> 8) & 0xff;
  buf[i++] = spsRaw.length & 0xff;
  buf.set(spsRaw, i); i += spsRaw.length;
  buf[i++] = 1;                          // numPictureParameterSets
  buf[i++] = (ppsRaw.length >> 8) & 0xff;
  buf[i++] = ppsRaw.length & 0xff;
  buf.set(ppsRaw, i);
  return buf;
}

function configureDecoder() {
  if (!spsNalu || !ppsNalu) return;
  if (decoder && decoder.state !== 'closed') { decoder.close(); }
  gotKeyframe = false;
  const spsRaw = stripStartCode(spsNalu);
  const ppsRaw = stripStartCode(ppsNalu);
  const description = buildAVCDescription(spsRaw, ppsRaw);
  const codec = `avc1.${spsRaw[1].toString(16).padStart(2,'0')}${spsRaw[2].toString(16).padStart(2,'0')}${spsRaw[3].toString(16).padStart(2,'0')}`;
  decoder = new VideoDecoder({
    output(frame) {
      // Resize canvas to match actual video dimensions on first frame
      if (canvas.width !== frame.displayWidth || canvas.height !== frame.displayHeight) {
        canvas.width = frame.displayWidth;
        canvas.height = frame.displayHeight;
        console.log('Canvas resized to', frame.displayWidth, 'x', frame.displayHeight);
      }
      ctx.drawImage(frame, 0, 0);
      const now = performance.now();
      latencyEl.textContent = `${Math.round(1000 / (now - lastFrameTime))} fps`;
      lastFrameTime = now;
      frame.close();
    },
    error(e) {
      console.error('VideoDecoder error:', e);
      gotKeyframe = false;
    }
  });
  console.log('Configuring decoder:', codec, 'desc len:', description.length);
  decoder.configure({ codec, optimizeForLatency: true });
}

// Split Annex-B stream into individual NAL units
function splitNALUs(data) {
  const nalus = [];
  let start = -1;
  for (let i = 0; i < data.length - 2; i++) {
    const is3 = data[i] === 0 && data[i+1] === 0 && data[i+2] === 1;
    const is4 = i < data.length - 3 && data[i] === 0 && data[i+1] === 0 && data[i+2] === 0 && data[i+3] === 1;
    if (is3 || is4) {
      if (start >= 0) nalus.push(data.slice(start, i));
      start = i;
      i += is4 ? 3 : 2;
    }
  }
  if (start >= 0) nalus.push(data.slice(start));
  return nalus;
}

function feedNALUs(data) {
  const nalus = splitNALUs(data);
  let needReconfigure = false;
  let hasIDR = false;

  // First pass: extract SPS/PPS and detect IDR
  for (const nalu of nalus) {
    const raw = stripStartCode(nalu);
    if (raw.length === 0) continue;
    const naluType = raw[0] & 0x1f;
    if (naluType === 7) { spsNalu = nalu; needReconfigure = true; }
    else if (naluType === 8) { ppsNalu = nalu; needReconfigure = true; }
    else if (naluType === 5) hasIDR = true;
  }

  if (needReconfigure) configureDecoder();
  if (!decoder || decoder.state !== 'configured') return;
  if (hasIDR) gotKeyframe = true;
  if (!gotKeyframe) return;

  // Drop if decoder is falling behind (backpressure)
  if (decoder.decodeQueueSize > 10) return;

  // For keyframes, prepend SPS+PPS so decoder has the parameter sets
  let chunkData = data;
  const firstType = data[4] & 0x1f;
  if (hasIDR && firstType !== 7) {
    const combined = new Uint8Array(spsNalu.length + ppsNalu.length + data.length);
    combined.set(spsNalu, 0);
    combined.set(ppsNalu, spsNalu.length);
    combined.set(data, spsNalu.length + ppsNalu.length);
    chunkData = combined;
  }

  try {
    decoder.decode(new EncodedVideoChunk({
      type: hasIDR ? 'key' : 'delta',
      timestamp: performance.now() * 1000,
      data: chunkData,
    }));
  } catch(e) {
    console.warn('decode error:', e.message);
  }
}

function handleVideoData(data) {
  if (typeof VideoDecoder === 'undefined') {
    statusEl.textContent = 'WebCodecs not supported in this browser';
    return;
  }
  // ws.binaryType = 'arraybuffer' so data is ArrayBuffer; convert to Uint8Array for parsing
  const bytes = data instanceof ArrayBuffer ? new Uint8Array(data) : data;
  feedNALUs(bytes);
}

// ---- Touch input ----
function getRelativePos(e) {
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches ? e.touches[0] : e;
  return {
    x: (touch.clientX - rect.left) / rect.width,
    y: (touch.clientY - rect.top) / rect.height,
  };
}

function sendTouch(action, e) {
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  e.preventDefault();
  const pos = getRelativePos(e);
  ws.send(JSON.stringify({ action, x: pos.x, y: pos.y }));
}

canvas.addEventListener('mousedown',  e => sendTouch(0, e));
canvas.addEventListener('mouseup',    e => sendTouch(1, e));
canvas.addEventListener('mousemove',  e => { if (e.buttons) sendTouch(2, e); });
canvas.addEventListener('touchstart', e => sendTouch(0, e), { passive: false });
canvas.addEventListener('touchend',   e => sendTouch(1, e), { passive: false });
canvas.addEventListener('touchmove',  e => sendTouch(2, e), { passive: false });

// Init
loadDevices();
</script>
</body>
</html>
